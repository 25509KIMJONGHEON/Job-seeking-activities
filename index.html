<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>書籍検索システム</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Modal Styles */
        .modal {
            display: none; /* Hidden by default */
            /* Animation */
            animation: fadeIn 0.3s ease-out;
        }

        .modal.show {
            position: fixed; /* Stay in place */
            z-index: 1000; /* Sit on top */
            left: 0;
            top: 0;
            width: 100%; /* Full width */
            height: 100%; /* Full height */
            overflow: auto; /* Enable scroll if needed */
            background-color: rgba(0,0,0,0.6); /* Black w/ opacity */
            display: flex; /* Use flexbox for centering */
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--modal-content-bg);
            padding: 30px;
            border: none;
            width: 80%;
            max-width: 700px;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2),0 6px 20px 0 rgba(0,0,0,0.19);
            animation: slideIn 0.4s ease-out;
            color: var(--modal-text);
        }

        .close-button {
            color: var(--modal-close-btn);
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        .close-button:hover,
        .close-button:focus {
            color: var(--modal-close-btn-hover);
            text-decoration: none;
            cursor: pointer;
        }

        #modal-book-details {
            display: flex;
            gap: 25px;
        }

        #modal-book-details img {
            width: 150px;
            height: auto;
            object-fit: contain;
            border-radius: 4px;
            align-self: flex-start;
        }

        #modal-book-details .text-content {
            flex: 1;
        }

        #modal-book-details h2 { margin-top: 0; color: #2c3e50; }
        #modal-book-details p { line-height: 1.6; }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .pagination-container {
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <header class="hero-section">
        <div class="theme-switch-wrapper">
            <label class="theme-switch" for="checkbox">
                <input type="checkbox" id="checkbox" />
                <div class="slider"></div>
            </label>
            <span>🌙</span>
        </div>
        <div class="hero-content">
            <h1>📚 書籍検索システム</h1>
            <p class="subtitle">お探しの本を見つけて、新しい知識の世界へ旅立ちましょう。</p>
            <div class="search-box">
                <input type="text" id="keyword" placeholder="著者名やタイトルを入力..." autocomplete="off">
                <button onclick="searchBooks()">検索</button>
                <div id="autocomplete-list" class="autocomplete-items"></div>
            </div>
        </div>
    </header>

    <main id="results" class="results-container"></main>
    <div id="pagination" class="pagination-container"></div>

    <!-- The Modal -->
    <div id="book-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <div id="modal-book-details"></div>
        </div>
    </div>

    <script>
        // 현재 페이지와 검색어 상태를 관리하는 변수
        let currentPage = 1;
        let currentKeyword = '';
        let totalItems = 0;

        // 모달 관련 요소 가져오기
        const modal = document.getElementById('book-modal');
        const closeBtn = document.getElementsByClassName('close-button')[0];

        // 닫기 버튼 클릭 시 모달 닫기
        closeBtn.onclick = function() {
            modal.classList.remove('show');
        }
        // 모달 바깥 영역 클릭 시 모달 닫기
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.classList.remove('show');
            }
        }

        // 테마 전환 로직
        const themeToggle = document.getElementById('checkbox');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.checked = true;
        }

        themeToggle.addEventListener('change', function() {
            document.body.classList.toggle('dark-mode');
            let theme = 'light';
            if (document.body.classList.contains('dark-mode')) theme = 'dark';
            localStorage.setItem('theme', theme);
        }
        
        // 자동완성 로직
        const keywordInput = document.getElementById('keyword');
        const autocompleteList = document.getElementById('autocomplete-list');
        let debounceTimeout;

        keywordInput.addEventListener('input', function() {
            clearTimeout(debounceTimeout);
            const query = this.value;

            if (query.length < 2) {
                autocompleteList.innerHTML = '';
                return;
            }

            debounceTimeout = setTimeout(async () => {
                const response = await fetch(`/search?q=${query}&page=1`);
                const data = await response.json();
                autocompleteList.innerHTML = '';
                if (data.items) {
                    data.items.slice(0, 5).forEach(item => { // 최대 5개 제안
                        const title = item.volumeInfo.title;
                        const div = document.createElement('div');
                        div.innerHTML = title;
                        div.addEventListener('click', function() {
                            keywordInput.value = this.innerText;
                            autocompleteList.innerHTML = '';
                            searchBooks();
                        });
                        autocompleteList.appendChild(div);
                    });
                }
            }, 300); // 300ms 디바운스
        });

        // 외부 클릭 시 자동완성 목록 닫기
        document.addEventListener('click', function (e) {
            if (e.target !== keywordInput) {
                autocompleteList.innerHTML = '';
            }
        });

        // Enter 키를 눌러도 검색이 되도록 설정
        document.getElementById('keyword').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                searchBooks();
            }
        });

        async function searchBooks() {
            currentKeyword = document.getElementById('keyword').value;
            currentPage = 1; // 새로운 검색은 항상 1페이지에서 시작
            fetchAndDisplayBooks();
        }

        async function changePage(newPage) {
            currentPage = newPage;
            fetchAndDisplayBooks();
        }

        async function fetchAndDisplayBooks() {
            const resultsDiv = document.querySelector('#results');
            resultsDiv.innerHTML = '<p>検索中...</p>'; // 로딩 표시
            document.getElementById('pagination').innerHTML = ''; // 페이지네이션 초기화

            if (!currentKeyword) {
                resultsDiv.innerHTML = '<p>キーワードを入力してください。</p>';
                return;
            }

            try {
                // 서버의 /search 엔드포인트로 요청을 보냅니다.
                const response = await fetch(`/search?q=${currentKeyword}&page=${currentPage}`);
                const data = await response.json();
                resultsDiv.innerHTML = ''; // 이전 결과 지우기

                if (data.items?.length > 0) {
                    totalItems = data.totalItems; // 전체 아이템 개수 저장
                    data.items.forEach(item => {
                        const info = item.volumeInfo;
                        const title = info.title;
                        const author = info.authors ? info.authors.join(', ') : '著者不明';
                        const thumbnail = info.imageLinks?.thumbnail || '';
                        
                        const card = document.createElement('div');
                        card.className = 'book-card';
                        card.onclick = () => showBookDetails(item); // 카드 클릭 시 상세 정보 표시

                        if (thumbnail) {
                            const img = document.createElement('img');
                            img.src = thumbnail;
                            img.alt = title;
                            card.appendChild(img);
                        }
                        
                        card.innerHTML += `
                            <h3>${title}</h3>
                            <p>著者: ${author}</p>`;
                        resultsDiv.appendChild(card);
                    });
                } else {
                    resultsDiv.innerHTML = '<p>結果が見つかりませんでした。</p>';
                    totalItems = 0;
                }

                renderPagination();

            } catch (error) {
                console.error('Error fetching books:', error);
                resultsDiv.innerHTML = '<p>情報の取得中にエラーが発生しました。</p>';
            }
        }

        function showBookDetails(bookItem) {
            const detailsDiv = document.getElementById('modal-book-details');
            const info = bookItem.volumeInfo;

            const title = info.title || 'タイトル不明';
            const author = info.authors ? info.authors.join(', ') : '著者不明';
            const publisher = info.publisher || '出版社不明';
            const publishedDate = info.publishedDate || '出版日不明';
            const description = info.description || '説明がありません。';
            const thumbnail = info.imageLinks?.thumbnail || '';

            detailsDiv.innerHTML = `
                <img src="${thumbnail}" alt="${title}">
                <div class="text-content">
                    <h2>${title}</h2>
                    <p><strong>著者:</strong> ${author}</p>
                    <p><strong>出版社:</strong> ${publisher} (${publishedDate})</p>
                    <p>${description}</p>
                </div>
            `;
            modal.classList.add('show');
        }

        function renderPagination() {
            const paginationDiv = document.getElementById('pagination');
            paginationDiv.innerHTML = '';
            const maxResults = 12;
            const totalPages = Math.ceil(totalItems / maxResults);

            if (totalPages > 1) {
                // 이전 버튼
                if (currentPage > 1) {
                    const prevButton = document.createElement('button');
                    prevButton.innerText = '前へ';
                    prevButton.onclick = () => changePage(currentPage - 1);
                    paginationDiv.appendChild(prevButton);
                }

                // 페이지 번호 표시
                const pageInfo = document.createElement('span');
                pageInfo.innerText = `${currentPage} / ${totalPages} ページ`;
                paginationDiv.appendChild(pageInfo);

                // 다음 버튼
                if (currentPage < totalPages) {
                    const nextButton = document.createElement('button');
                    nextButton.innerText = '次へ';
                    nextButton.onclick = () => changePage(currentPage + 1);
                    paginationDiv.appendChild(nextButton);
                }
            }
        }
    </script>
</body>
</html>
